<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clue Quiz ❤️</title>

<style>
html, body {
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffe4ec, #fff7f9);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 15px;
    overflow-x: hidden;
    position: relative;
    box-sizing: border-box;
}

/* CARD */
.card {
    background: white;
    width: 100%;
    max-width: 650px;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 10px 35px rgba(0,0,0,.15);
    text-align: center;
    position: relative;
    z-index: 2;
    animation: fadeIn 1s ease;
}

/* TEXT */
h1 {
    color: #e91e63;
    margin-bottom: 10px;
}

.intro {
    color: #666;
    line-height: 1.6;
    margin-bottom: 25px;
}

/* QUESTIONS */
.question {
    text-align: left;
    margin-top: 20px;
    font-weight: bold;
    color: #444;
    display: none;
}

.question.active {
    display: block;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 2px solid #eee;
    font-size: 16px;
    box-sizing: border-box;
}

input:focus {
    border-color: #e91e63;
    outline: none;
}

/* BUTTON */
button {
    margin-top: 25px;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    background: #e91e63;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

button:hover {
    background: #d81b60;
    transform: scale(1.03);
}

/* MESSAGE */
#message {
    margin-top: 20px;
    font-weight: bold;
    color: #e91e63;
    min-height: 24px;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -40px;
    font-size: 22px;
    opacity: 0.6;
    animation: floatUp 7s linear infinite;
    pointer-events: none;
    z-index: 1;
}

@keyframes floatUp {
    0% { transform: translateY(0) scale(.8); opacity: 0; }
    20% { opacity: .6; }
    100% { transform: translateY(-120vh) scale(1.3); opacity: 0; }
}

/* ANIMATIONS */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.fadeOut {
    animation: fadeOut 1s forwards;
}

@keyframes fadeOut {
    to { opacity: 0; transform: scale(.95); }
}
</style>
</head>

<body>

<!-- hearts -->
<div class="heart" style="left:10%;">❤️</div>
<div class="heart" style="left:25%; animation-delay:2s;">💖</div>
<div class="heart" style="left:40%; animation-delay:4s;">💕</div>
<div class="heart" style="left:60%; animation-delay:1s;">💗</div>
<div class="heart" style="left:80%; animation-delay:3s;">❤️</div>

<div class="card" id="card">

<h1>💖 Clue Quiz 💖</h1>

<p class="intro">
Answer each clue correctly to unlock the next one...<br>
Each answer leads you closer to your gift ❤️ xx
</p>

<!-- Q1 -->
<div class="question active" id="q1wrap">
<div>1. Who's the prettiest girl in the world?</div>
<input id="q1">
</div>

<!-- Q2 -->
<div class="question" id="q2wrap">
<div>2. What Taylor Swift album does <em>Invisible String</em> appear on?</div>
<input id="q2">
</div>

<!-- Q3 -->
<div class="question" id="q3wrap">
<div>3. What is the bonus track on the Folklore Deluxe Edition?</div>
<input id="q3">
</div>

<button onclick="checkAnswer()">Submit ❤️</button>

<p id="message"></p>

</div>

<script>

let step = 1;

function clean(v){
    return v.trim().toLowerCase();
}

function checkAnswer(){

const msg = document.getElementById("message");

if(step === 1){
    let a = clean(document.getElementById("q1").value);

    if(a === "zoey"){
        msg.innerHTML = "💖 Correct!";
        unlock(2);
    } else {
        msg.innerHTML = "❌ Not quite... try again ❤️";
    }
}

else if(step === 2){
    let a = clean(document.getElementById("q2").value);

    if(a === "folklore"){
        msg.innerHTML = "💖 Lovely!";
        unlock(3);
    } else {
        msg.innerHTML = "❌ Think Taylor Swift era... ❤️";
    }
}

else if(step === 3){
    let a = clean(document.getElementById("q3").value);

    if(a === "the lakes"){
        msg.innerHTML = "🎉 You found all the clues... unlocking your gift ❤️";

        setTimeout(()=>{
            document.getElementById("card").classList.add("fadeOut");
        },800);

        setTimeout(()=>{
            window.location.href = "Gift.html";
        },1800);

    } else {
        msg.innerHTML = "❌ So close... last clue ❤️";
    }
}

}

function unlock(next){

step = next;

if(next === 2){
    document.getElementById("q2wrap").classList.add("active");
}

if(next === 3){
    document.getElementById("q3wrap").classList.add("active");
}

document.getElementById("message").innerHTML = "✨ New clue unlocked ✨";

}

</script>

</body>
</html>
