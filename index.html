<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "Arial", sans-serif;
            background: linear-gradient(135deg, #ffe6f0, #fff5f7);
        }

        .card {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 500px;
            animation: fadeIn 1.2s ease-in-out;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 20px;
            color: #d63384;
        }

        img {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
        }

        p {
            margin-top: 15px;
            color: #555;
            font-size: 1rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Happy Anniversary Zoey 💖</h1>
        <img src="Screenshot_20260626_140020_Spotify.jpg" alt="Anniversary Image">
        <p>Every day with you is my favourite day.</p>
    </div>
</body>
</html>
