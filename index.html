<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ffe4ec, #fff7f9);
            overflow: hidden;
        }

        .card {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15);
            max-width: 500px;
            animation: fadeIn 1.2s ease-in-out;
            position: relative;
            z-index: 2;
        }

        h1 {
            margin: 0 0 15px;
            font-size: 2.2rem;
            color: #e91e63;
        }

        .spotify-link {
            display: inline-block;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 15px;
        }

        .spotify-link:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
        }

        img {
            width: 100%;
            border-radius: 15px;
            display: block;
        }

        p {
            margin-top: 15px;
            color: #666;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating hearts */
        .heart {
            position: absolute;
            color: rgba(255, 105, 135, 0.6);
            animation: floatUp 6s infinite ease-in;
            font-size: 20px;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.8);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <!-- Floating hearts -->
    <div class="heart" style="left:10%;">❤️</div>
    <div class="heart" style="left:25%; animation-delay:2s;">💖</div>
    <div class="heart" style="left:40%; animation-delay:4s;">❤️</div>
    <div class="heart" style="left:60%; animation-delay:1s;">💗</div>
    <div class="heart" style="left:80%; animation-delay:3s;">💖</div>

    <div class="card">
        <h1>Happy Anniversary Zozo 💖</h1>

        <a class="spotify-link"
           href="https://open.spotify.com/track/0eFQWVz0qIxDOvhLpZ40P7?si=wpIwPnUyQm6Zo7pLS-09hw"
           target="_blank">

            <img src="Screenshot_20260626_140020_Spotify.jpg" alt="Anniversary Image">
        </a>

        <p>Tap the Spotify image for a clue 🎧</p>
    </div>

</body>
</html>
